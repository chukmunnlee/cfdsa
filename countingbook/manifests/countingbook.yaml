---
apiVersion: v1
kind: Service
metadata:
  name: countingbook-svc
spec:
  type: ClusterIP
  selector:
    app: countingbook
  ports:
  - port: 8080
    targetPort: 8080

---
apiVersion: v1
kind: Service
metadata:
  name: preview-countingbook-svc
spec:
  type: ClusterIP
  selector:
    app: countingbook
  ports:
  - port: 8080
    targetPort: 8080

---
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: countingbook-ro
spec:
  replicas: 2
  selector:
    matchLabels:
      &pod-labels
      app: countingbook
      name: countingbook-po
  strategy:
    blueGreen:
      activeService: countingbook-svc
      previewService: preview-countingbook-svc
      autoPromotionEnabled: false
      scaleDownDelaySeconds: 15
  template:
    metadata:
      labels:
        <<: *pod-labels
    spec:
      containers:
      - name: countingbook-container
        image: registry.gitlab.com/soda9105822/countingbook:4ad2235b
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
