<!-- v3 -->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TechShop — New Arrivals</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0d0d0f;
      --surface:    #16161a;
      --surface2:   #1e1e24;
      --border:     rgba(255,255,255,0.07);
      --border2:    rgba(255,255,255,0.12);
      --text:       #f0efe8;
      --muted:      #6b6a72;
      --accent:     #e8ff47;
      --accent-dim: rgba(232,255,71,0.12);
      --red:        #ff4d4d;
      --font:       'Syne', sans-serif;
      --body:       'Inter', sans-serif;
      --radius:     12px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--body);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Layout ── */
    .shell {
      display: grid;
      grid-template-columns: 220px 1fr;
      grid-template-rows: 60px 1fr;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      grid-column: 1 / -1;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .logo {
      font-family: var(--font);
      font-size: 1.15rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--text);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    nav a {
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: 0.02em;
      transition: color 0.15s;
    }

    nav a:hover { color: var(--text); }

    .new-badge {
      background: var(--accent);
      color: #0d0d0f;
      font-family: var(--font);
      font-size: 0.65rem;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 20px;
      letter-spacing: 0.06em;
    }

    /* ── Sidebar ── */
    aside {
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 2rem 1.5rem;
      position: sticky;
      top: 60px;
      height: calc(100vh - 60px);
      overflow-y: auto;
    }

    .sidebar-label {
      font-family: var(--font);
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    .filter-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .filter-btn {
      width: 100%;
      background: none;
      border: none;
      text-align: left;
      padding: 7px 10px;
      border-radius: 7px;
      font-family: var(--body);
      font-size: 0.82rem;
      color: var(--muted);
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .filter-btn:hover { background: var(--surface2); color: var(--text); }

    .filter-btn.active {
      background: var(--accent-dim);
      color: var(--accent);
    }

    .filter-count {
      font-size: 0.7rem;
      color: var(--muted);
      font-family: 'Inter', monospace;
    }

    .filter-btn.active .filter-count { color: var(--accent); opacity: 0.7; }

    .sidebar-divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1.5rem 0;
    }

    /* ── Main content ── */
    .main {
      padding: 2rem;
      overflow-y: auto;
    }

    /* ── Hero strip ── */
    .hero {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      gap: 2rem;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      top: -60px; right: -60px;
      width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(232,255,71,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-img {
      width: 120px;
      height: 120px;
      object-fit: contain;
      background: var(--surface2);
      border-radius: 10px;
      padding: 12px;
      flex-shrink: 0;
    }

    .hero-body { flex: 1; }

    .hero-eyebrow {
      font-size: 0.65rem;
      font-weight: 700;
      font-family: var(--font);
      letter-spacing: 0.12em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    .hero-title {
      font-family: var(--font);
      font-size: 1.35rem;
      font-weight: 700;
      line-height: 1.2;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
      color: var(--text);
    }

    .hero-desc {
      font-size: 0.82rem;
      color: var(--muted);
      line-height: 1.5;
      max-width: 380px;
    }

    .hero-price {
      font-family: var(--font);
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.03em;
    }

    .hero-cta {
      margin-top: 1rem;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--accent);
      color: #0d0d0f;
      font-family: var(--font);
      font-size: 0.78rem;
      font-weight: 700;
      padding: 9px 18px;
      border-radius: 7px;
      border: none;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: opacity 0.15s;
    }

    .hero-cta:hover { opacity: 0.88; }

    /* ── Section header ── */
    .section-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 1.25rem;
    }

    .section-title {
      font-family: var(--font);
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .section-count {
      font-size: 0.78rem;
      color: var(--muted);
    }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1rem;
    }

    /* ── Product card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      position: relative;
      transition: border-color 0.2s, transform 0.2s;
      cursor: pointer;
    }

    .card:hover {
      border-color: var(--border2);
      transform: translateY(-3px);
    }

    .card:hover .card-img { opacity: 0.9; }

    .card-img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: contain;
      background: var(--surface2);
      padding: 1.25rem;
      display: block;
      transition: opacity 0.2s;
    }

    .card-body {
      padding: 0.875rem 1rem 1rem;
      border-top: 1px solid var(--border);
    }

    .card-category {
      display: inline-block;
      font-size: 0.65rem;
      font-family: var(--font);
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.45rem;
    }

    .card-name {
      font-size: 0.82rem;
      font-weight: 500;
      line-height: 1.35;
      margin-bottom: 0.75rem;
      color: var(--text);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-price {
      font-family: var(--font);
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.02em;
    }

    .card-rating {
      font-size: 0.72rem;
      color: var(--muted);
    }

    .stars { color: #f5c842; }

    /* new arrival ribbon */
    .ribbon-new {
      position: absolute;
      top: 10px;
      left: 10px;
      background: var(--accent);
      color: #0d0d0f;
      font-family: var(--font);
      font-size: 0.6rem;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 4px;
      letter-spacing: 0.08em;
    }

    /* low stock warning */
    .low-stock {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: rgba(255,77,77,0.1);
      border-top: 1px solid rgba(255,77,77,0.2);
      padding: 4px 10px;
      font-size: 0.68rem;
      color: var(--red);
      font-weight: 500;
    }

    /* ── Skeleton ── */
    .skeleton {
      background: linear-gradient(90deg, var(--surface2) 25%, #232329 50%, var(--surface2) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 4px;
    }

    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .skel-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .skel-img  { width: 100%; aspect-ratio: 1; }
    .skel-body { padding: 0.875rem 1rem 1rem; border-top: 1px solid var(--border); }
    .skel-line { height: 11px; margin-bottom: 8px; }
    .skel-line.short { width: 45%; }
    .skel-line.long  { width: 88%; }
    .skel-line.price { width: 30%; height: 15px; }

    /* ── Empty state ── */
    .empty {
      grid-column: 1 / -1;
      padding: 4rem 2rem;
      text-align: center;
      color: var(--muted);
      font-size: 0.88rem;
    }

    .empty strong {
      display: block;
      font-family: var(--font);
      font-size: 1rem;
      color: var(--text);
      margin-bottom: 0.4rem;
    }

    /* ── Footer ── */
    footer {
      grid-column: 1 / -1;
      border-top: 1px solid var(--border);
      padding: 1.5rem 2rem;
      font-size: 0.78rem;
      color: var(--muted);
      text-align: center;
      background: var(--surface);
    }
  </style>
</head>
<body>
</body>
  <app-root></app-root>
</html>
