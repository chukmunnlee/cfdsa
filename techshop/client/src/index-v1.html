<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <base href="/">
  <title>TechShop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f7f6f3;
      --surface:   #ffffff;
      --border:    #e4e2dc;
      --text:      #1a1917;
      --muted:     #7a7870;
      --accent:    #1a1917;
      --cat-bg:    #eeede9;
      --cat-text:  #5a5854;
      --font:      'DM Sans', sans-serif;
      --mono:      'DM Mono', monospace;
      --radius:    10px;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .logo {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text);
      text-decoration: none;
    }

    nav {
      display: flex;
      gap: 1.5rem;
    }

    nav a {
      font-size: 0.85rem;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.15s;
    }

    nav a:hover { color: var(--text); }

    /* ── Page shell ── */
    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2.5rem 2rem 4rem;
    }

    .page-title {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.03em;
      margin-bottom: 0.4rem;
    }

    .page-sub {
      font-size: 0.875rem;
      color: var(--muted);
      margin-bottom: 2rem;
    }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1.25rem;
    }

    /* ── Product card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color 0.15s, transform 0.15s;
      cursor: pointer;
    }

    .card:hover {
      border-color: #bbb9b2;
      transform: translateY(-2px);
    }

    .card-img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: contain;
      background: var(--bg);
      padding: 1.25rem;
      display: block;
    }

    .card-body {
      padding: 0.875rem 1rem 1rem;
      border-top: 1px solid var(--border);
    }

    .card-category {
      display: inline-block;
      font-size: 0.7rem;
      font-family: var(--mono);
      background: var(--cat-bg);
      color: var(--cat-text);
      padding: 2px 7px;
      border-radius: 4px;
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .card-name {
      font-size: 0.85rem;
      font-weight: 500;
      line-height: 1.35;
      margin-bottom: 0.6rem;
      color: var(--text);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-description {
      font-size: 0.85rem;
      color: var(--text);
      margin-bottom: 0.6rem;
    }

    .card-price {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
    }

    /* ── Rating ── */
    .card-rating {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 0.35rem;
    }

    .stars { color: #d4a017; }

    /* ── Skeleton loader ── */
    .skeleton {
      background: linear-gradient(90deg, var(--border) 25%, var(--cat-bg) 50%, var(--border) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 4px;
    }

    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .skel-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .skel-img  { width: 100%; aspect-ratio: 1; }
    .skel-body { padding: 0.875rem 1rem 1rem; border-top: 1px solid var(--border); }
    .skel-line { height: 12px; margin-bottom: 8px; }
    .skel-line.short { width: 55%; }
    .skel-line.long  { width: 90%; }
    .skel-line.price { width: 35%; height: 16px; }

    /* ── Error ── */
    .error-msg {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .error-msg strong { display: block; font-size: 1.1rem; color: var(--text); margin-bottom: 0.5rem; }

    /* ── Footer ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 1.5rem 2rem;
      font-size: 0.8rem;
      color: var(--muted);
      text-align: center;
    }
  </style>
</head>
<body>
  <app-root></app-root>
</body>
</html>
