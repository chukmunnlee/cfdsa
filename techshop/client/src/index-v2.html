<!-- v2 -->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TechShop — Summer Sale</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #f7f6f3;
      --surface:     #ffffff;
      --border:      #e4e2dc;
      --text:        #1a1917;
      --muted:       #7a7870;
      --cat-bg:      #eeede9;
      --cat-text:    #5a5854;
      --font:        'DM Sans', sans-serif;
      --mono:        'DM Mono', monospace;
      --radius:      10px;

      /* Sale-specific tokens — the only additions in v2 */
      --sale-banner: #c1121f;
      --sale-header: #12111a;
      --sale-nav:    #1e1d2b;
      --sale-red:    #c1121f;
      --sale-muted:  #9b99a8;
      --sale-border: #2d2c3a;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header (v2: dark + sale banner) ── */
    header {
      background: var(--sale-header);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .sale-banner {
      background: var(--sale-banner);
      text-align: center;
      padding: 7px 1rem;
      font-size: 0.78rem;
      font-weight: 500;
      color: #fff;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .header-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      height: 56px;
      border-bottom: 1px solid var(--sale-border);
    }

    .logo {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: #fff;
      text-decoration: none;
    }

    .logo span {
      color: var(--sale-banner);
      margin-left: 4px;
      font-size: 0.65rem;
      font-family: var(--mono);
      vertical-align: middle;
      background: rgba(193,18,31,0.18);
      padding: 2px 6px;
      border-radius: 4px;
      letter-spacing: 0.06em;
    }

    nav {
      display: flex;
      gap: 1.5rem;
    }

    nav a {
      font-size: 0.85rem;
      color: var(--sale-muted);
      text-decoration: none;
      transition: color 0.15s;
    }

    nav a:hover { color: #fff; }

    /* ── Page shell ── */
    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2.5rem 2rem 4rem;
    }

    .page-title {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.03em;
      margin-bottom: 0.4rem;
    }

    .page-sub {
      font-size: 0.875rem;
      color: var(--muted);
      margin-bottom: 2rem;
    }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1.25rem;
    }

    /* ── Product card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      position: relative;
      transition: border-color 0.15s, transform 0.15s;
      cursor: pointer;
    }

    .card:hover {
      border-color: #bbb9b2;
      transform: translateY(-2px);
    }

    .card-img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: contain;
      background: var(--bg);
      padding: 1.25rem;
      display: block;
    }

    .card-body {
      padding: 0.875rem 1rem 1rem;
      border-top: 1px solid var(--border);
    }

    .card-category {
      display: inline-block;
      font-size: 0.7rem;
      font-family: var(--mono);
      background: var(--cat-bg);
      color: var(--cat-text);
      padding: 2px 7px;
      border-radius: 4px;
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .card-name {
      font-size: 0.85rem;
      font-weight: 500;
      line-height: 1.35;
      margin-bottom: 0.6rem;
      color: var(--text);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-description {
      font-size: 0.85rem;
      color: var(--text);
      margin-bottom: 0.6rem;
    }

    /* v2: price block replaces single price line */
    .price-block { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; }

    .price-original {
      font-size: 0.82rem;
      color: var(--muted);
      text-decoration: line-through;
    }

    .price-sale {
      font-size: 1rem;
      font-weight: 600;
      color: var(--sale-red);
    }

    .price-saving {
      font-size: 0.7rem;
      font-family: var(--mono);
      background: #fde8e8;
      color: var(--sale-red);
      padding: 1px 6px;
      border-radius: 4px;
    }

    /* v2: sale ribbon */
    .ribbon {
      position: absolute;
      top: 10px;
      right: 10px;
      background: var(--sale-banner);
      color: #fff;
      font-size: 0.65rem;
      font-weight: 600;
      font-family: var(--mono);
      padding: 3px 8px;
      border-radius: 4px;
      letter-spacing: 0.08em;
    }

    /* ── Rating ── */
    .card-rating {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 0.35rem;
    }

    .stars { color: #d4a017; }

    /* ── Skeleton loader ── */
    .skeleton {
      background: linear-gradient(90deg, var(--border) 25%, var(--cat-bg) 50%, var(--border) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 4px;
    }

    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .skel-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .skel-img  { width: 100%; aspect-ratio: 1; }
    .skel-body { padding: 0.875rem 1rem 1rem; border-top: 1px solid var(--border); }
    .skel-line { height: 12px; margin-bottom: 8px; }
    .skel-line.short { width: 55%; }
    .skel-line.long  { width: 90%; }
    .skel-line.price { width: 35%; height: 16px; }

    /* ── Error ── */
    .error-msg {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .error-msg strong { display: block; font-size: 1.1rem; color: var(--text); margin-bottom: 0.5rem; }

    /* ── Footer ── */
    footer {
      background: var(--sale-header);
      border-top: 1px solid var(--sale-border);
      padding: 1.5rem 2rem;
      font-size: 0.8rem;
      color: var(--sale-muted);
      text-align: center;
    }
  </style>
</head>
<body>
</body>
  <app-root></app-root>
</html>
