---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: api-gtw
  namespace: api-ns
spec:
  gatewayClassName: cilium  
  listeners:
  - name: http
    #hostname: "*.192.168.39.200.nip.io"
    hostname: "*.nip.io"
    protocol: HTTP
    port: 80

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: api-httproute
  namespace: api-ns
spec:
  hostnames:
  - fakeapi.192.168.39.200.nip.io

  parentRefs:
  - name: api-gtw
    namespace: api-ns
    port: 80
    #sectionName: http

  rules:
  - matches: 
    - path: 
        value: /
        type: PathPrefix
    backendRefs:
    - name: apiv1-svc
      kind: Service
      port: 3000
      weight: 77
    - name: apiv2-svc
      kind: Service
      port: 3000
      weight: 33
